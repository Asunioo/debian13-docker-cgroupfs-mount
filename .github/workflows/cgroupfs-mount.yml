name: Build cgroupfs-mount for Debian 13

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-debian-13:
    runs-on: ubuntu-latest
    
    # 使用官方的 Debian 13 (trixie) 容器作为构建环境
    container:
      image: debian:trixie
      
    steps:
      # 1. 检出当前仓库的代码（已升级至 v5 以支持 Node.js 24）
      - name: Checkout repository
        uses: actions/checkout@v5
        
      # 2. 更新软件源并安装必要的构建工具链
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            dpkg-dev \
            fakeroot \
            debhelper \
            git
            
      # 3. 获取上游源码并进行编译打包
      - name: Build Debian package from GitHub
        run: |
          # 克隆上游源码仓库（Docker官方维护版本）
          git clone https://github.com/tianon/cgroupfs-mount.git
          
          # 【核心修复】进入源码目录后，立即退回工作区根目录执行打包！
          # 这样 debuild 生成的 .deb 文件会直接落在当前工作区根目录下，避免跨目录操作
          cd cgroupfs-mount && cd ..
          
          # 清理可能存在的旧构建残留，防止 debuild 报错中断
          rm -f *.deb *.changes *.buildinfo || true
          
          # 在工作区根目录执行本地编译打包（跳过 GPG 签名步骤）
          debuild -us -uc -b -d
          
          # 列出当前目录的文件，方便在 CI 日志中排查是否生成了 .deb 包
          echo "=== Files in current workspace ==="
          ls -la *.deb || echo "Warning: No deb files generated!"
          
      # 4. 将编译生成的 .deb 安装包作为 Artifact 上传保存（已升级至 v5）
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        if: always()  # 即使前面失败也尝试上传日志或产物
        with:
          name: cgroupfs-mount-deb
          path: "*.deb"
          retention-days: 7  # 设置保留7天，节省存储空间
